<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>포트폴리오 - 게시판</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header></header>
    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin: 30px 0;">
            <h2>자유게시판</h2>
            <button id="btn-write" class="btn-primary">글쓰기</button>
        </div>
        <table style="width: 100%; border-collapse: collapse; text-align: center;">
            <thead style="border-bottom: 1px solid var(--border-color); background: var(--bg-hover);">
                <tr>
                    <th style="padding:15px; width: 10%;">번호</th>
                    <th style="width: 50%;">제목</th>
                    <th style="width: 20%;">작성자</th>
                    <th style="width: 20%;">작성일</th>
                </tr>
            </thead>
            <tbody id="board-list"></tbody>
        </table>
    </main>

    <div id="modal-board-write" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="write-modal-title">새 글 작성</h3>
                <button class="close-btn" onclick="closeModal('modal-board-write')">&times;</button>
            </div>
            <form id="board-form">
                <div class="modal-body">
                    <input type="hidden" id="board-id">
                    <input type="text" id="board-title" placeholder="제목을 입력하세요" required>
                    <textarea id="board-content" placeholder="내용을 입력하세요" style="height: 200px;" required></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('modal-board-write')">취소</button>
                    <button type="submit" class="btn-primary">저장하기</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-board-detail" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="detail-title">제목</h3>
                <button class="close-btn" onclick="closeModal('modal-board-detail')">&times;</button>
            </div>
            <div class="modal-body">
                <div id="detail-meta" style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px;"></div>
                <div id="detail-content" style="white-space: pre-wrap; min-height: 150px; line-height: 1.8;"></div>
            </div>
            <div id="detail-footer" class="modal-footer"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/board.js"></script>
</body>
</html>
