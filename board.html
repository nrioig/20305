<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>포트폴리오 - 자유게시판</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .board-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .board-table th, .board-table td { padding: 12px; border-bottom: 1px solid var(--border-color); text-align: left; }
        .board-table th { background-color: var(--bg-hover); color: var(--text-light); }
        .board-table tr:hover { background-color: rgba(255,255,255,0.02); cursor: pointer; }
        .post-meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px; }
        .action-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    </style>
</head>
<body>
    <header></header>
    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin: 30px 0;">
            <h2>방명록 / 자유게시판</h2>
            <button id="btn-add-post" class="btn-primary">글쓰기</button>
        </div>
        
        <table class="board-table">
            <thead>
                <tr>
                    <th style="width: 60%;">제목</th>
                    <th style="width: 20%;">작성자</th>
                    <th style="width: 20%;">작성일</th>
                </tr>
            </thead>
            <tbody id="board-list"></tbody>
        </table>
    </main>

    <div id="modal-board-write" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3>새 게시글 작성</h3>
                <button class="close-btn" onclick="closeModal('modal-board-write')">&times;</button>
            </div>
            <form id="board-write-form">
                <div class="modal-body">
                    <div id="board-author-wrapper" style="margin-bottom: 15px;">
                        <input type="text" id="board-author-name" placeholder="작성자 이름 (미입력시 익명)">
                    </div>
                    <input type="text" id="board-title" placeholder="제목을 입력하세요" required style="margin-bottom: 15px;">
                    <textarea id="board-content" placeholder="내용을 자유롭게 남겨주세요!" style="height: 150px;" required></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('modal-board-write')">취소</button>
                    <button type="submit" id="btn-submit-write" class="btn-primary">등록하기</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-board-detail" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="detail-title">제목</h3>
                <button class="close-btn" onclick="closeModal('modal-board-detail')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="post-meta" id="detail-meta">작성자 | 날짜</div>
                <div id="detail-content" style="white-space: pre-wrap; min-height: 100px;">내용</div>
                
                <div class="action-buttons">
                    <button id="btn-edit-post" class="btn-secondary" style="display: none;">수정</button>
                    <button id="btn-delete-post" class="btn-danger" style="display: none;">삭제</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-board-edit" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3>게시글 수정</h3>
                <button class="close-btn" onclick="closeModal('modal-board-edit')">&times;</button>
            </div>
            <form id="board-edit-form">
                <div class="modal-body">
                    <input type="hidden" id="edit-board-id">
                    <input type="text" id="edit-board-title" required style="margin-bottom: 15px;">
                    <textarea id="edit-board-content" style="height: 150px;" required></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal('modal-board-edit')">취소</button>
                    <button type="submit" id="btn-submit-edit" class="btn-primary">수정완료</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/board.js"></script>
</body>
</html>
